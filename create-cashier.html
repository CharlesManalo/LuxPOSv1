<!doctype html>
<html>
  <head>
    <title>Create Cashier - LuxPOS</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #ff9e2c;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #ff8800;
      }
      .result {
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
      h1 {
        text-align: center;
        color: #2c2c2c;
      }
    </style>
  </head>
  <body>
    <h1>Create Cashier Account</h1>

    <div class="form-group">
      <label>Your Email (must be logged in):</label>
      <input
        type="email"
        id="ownerEmail"
        placeholder="testing@gmail.com or test@gmail.com"
      />
    </div>

    <div class="form-group">
      <label>Your Password:</label>
      <input type="password" id="ownerPassword" placeholder="123456" />
    </div>

    <div class="form-group">
      <label>Select Tenant/Shop:</label>
      <select id="tenantSelect" onchange="handleTenantChange()">
        <option value="">-- Loading tenants --</option>
      </select>
      <p class="hint" style="font-size: 12px; color: #666; margin-top: 5px">
        Admins can select any tenant. Owners can only select their own tenant.
      </p>
    </div>

    <div class="form-group">
      <label>Cashier Full Name:</label>
      <input type="text" id="cashierName" placeholder="John Doe" />
    </div>

    <div class="form-group">
      <label>Cashier Email:</label>
      <input type="email" id="cashierEmail" placeholder="cashier@example.com" />
    </div>

    <div class="form-group">
      <label>Cashier Password:</label>
      <input type="password" id="cashierPassword" value="123456" />
    </div>

    <button onclick="createCashier()">Create Cashier</button>

    <div id="result"></div>

    <script>
      const supabaseUrl = "https://cnycpwqkxytzinejlhkk.supabase.co";
      const supabaseAnonKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNueWNwd3FreHl0emluZWpsaGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDgyNDcsImV4cCI6MjA5MjE4NDI0N30.GfWWeIHEmmwT38FWJ-u8bTmSskkZb7xEWBs_aRaFgak";

      // Fetch all owners and populate dropdown
      async function fetchOwners() {
        const { createClient } = supabase;
        const client = createClient(supabaseUrl, supabaseAnonKey);

        // Get all users with 'owner' role
        const { data: owners, error } = await client
          .from("users")
          .select("email, tenant_id, full_name")
          .eq("role", "owner")
          .eq("is_active", true);

        if (error) {
          console.error("Error fetching owners:", error);
          return;
        }

        const tenantSelect = document.getElementById("tenantSelect");
        tenantSelect.innerHTML =
          '<option value="">-- Select a tenant --</option>';

        for (const owner of owners) {
          const option = document.createElement("option");
          option.value = owner.tenant_id;
          option.textContent = `${owner.full_name} (${owner.email})`;
          tenantSelect.appendChild(option);
        }
      }

      // Fetch owners when page loads
      window.onload = fetchOwners;

      async function createCashier() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "<p>Processing...</p>";

        try {
          const { createClient } = supabase;
          const client = createClient(supabaseUrl, supabaseAnonKey);

          // Sign in as owner
          const ownerEmail = document.getElementById("ownerEmail").value;
          const ownerPassword = document.getElementById("ownerPassword").value;

          const { data: authData, error: authError } =
            await client.auth.signInWithPassword({
              email: ownerEmail,
              password: ownerPassword,
            });

          if (authError) {
            throw new Error("Owner login failed: " + authError.message);
          }

          // Get session
          const {
            data: { session },
          } = await client.auth.getSession();

          // Get selected tenant from dropdown
          const tenantId = document.getElementById("tenantSelect").value;
          if (!tenantId) {
            throw new Error("Please select a tenant");
          }
          console.log("Selected tenant ID:", tenantId);

          // Create cashier via Edge Function
          const cashierName = document.getElementById("cashierName").value;
          const cashierEmail = document.getElementById("cashierEmail").value;
          const cashierPassword =
            document.getElementById("cashierPassword").value;

          const res = await fetch(
            `${supabaseUrl}/functions/v1/create-cashier`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${session?.access_token}`,
                apikey: supabaseAnonKey,
              },
              body: JSON.stringify({
                tenant_id: tenantId,
                full_name: cashierName,
                email: cashierEmail,
                password: cashierPassword,
              }),
            },
          );

          const result = await res.json();

          if (!res.ok) {
            throw new Error(result.error || "Failed to create cashier");
          }

          resultDiv.innerHTML = `<div class="result success">
          <h3>✅ Cashier Created Successfully!</h3>
          <p><strong>Email:</strong> ${cashierEmail}</p>
          <p><strong>Password:</strong> ${cashierPassword}</p>
          <p><strong>Name:</strong> ${cashierName}</p>
          <p><strong>Tenant:</strong> ${tenantId}</p>
        </div>`;

          // Clear form
          document.getElementById("cashierName").value = "";
          document.getElementById("cashierEmail").value = "";
        } catch (err) {
          resultDiv.innerHTML = `<div class="result error">
          <h3>❌ Error</h3>
          <p>${err.message}</p>
        </div>`;
          console.error("Error:", err);
        }
      }
    </script>
  </body>
</html>
